spring.application.name=negocio
server.port=8080

# MySQL Configuration
# DB_URL:
#   - Dev (default): createDatabaseIfNotExist crea la BD si no existe, allowPublicKeyRetrieval
#     evita errores con drivers modernos de MySQL, useSSL=false es suficiente en local.
#   - Prod (secret): La BD ya existe, la conexión es local (mismo equipo), se simplifica al mínimo.
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/negocio?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# JPA & Hibernate Settings
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# DDL_AUTO:
#   - Dev (default): 'update' sincroniza el esquema automáticamente con las entidades.
#   - Prod (secret):  'validate' solo verifica que el esquema coincida, nunca lo modifica.
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Username and Password
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:juventus14}

# Deshabilita el cacheo de los recursos estáticos por parte del navegador
spring.web.resources.cache.period=0
spring.web.resources.cache.cachecontrol.no-cache=true
spring.web.resources.cache.cachecontrol.no-store=true
spring.web.resources.cache.cachecontrol.must-revalidate=true

