name: Construir Aplicacion Spring y React

on:
  push:
    branches: [ main ]
    paths:
      - 'frontend/**'
      - 'backend/**'

jobs:
  build-and-package:
    name: Construir y Empaquetar
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias y construir el frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Copiar archivos del frontend al backend
        run: |
          mkdir -p backend/src/main/resources/static
          cp -r frontend/dist/* backend/src/main/resources/static/

      - name: Dar permisos de ejecución a Gradle
        run: chmod +x backend/gradlew

      - name: Construir el backend con Gradle
        env:
          DB_URL: ${{ secrets.PROD_DB_URL }}
          DB_USERNAME: ${{ secrets.PROD_DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.PROD_DB_PASSWORD }}
          DDL_AUTO: ${{ secrets.PROD_DDL_AUTO }}
        run: |
          cd backend
          ./gradlew bootJar

      - name: Subir artefacto (el .jar)
        uses: actions/upload-artifact@v6
        with:
          name: negocio-app-jar
          path: backend/build/libs/*.jar
